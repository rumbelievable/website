  <script>
    {
      const nav      = document.getElementById('siteNav');
      const navLinks = document.getElementById('navLinks');
      const lightbox = document.getElementById('lightbox');
      const lbImg    = document.getElementById('lightboxImg');
      let   lastFocus = null;

      window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 40), { passive: true });

      document.getElementById('navToggle').addEventListener('click', () => navLinks.classList.toggle('open'));

      document.addEventListener('click', e => {
        if (!nav.contains(e.target)) navLinks.classList.remove('open');
      });

      document.querySelectorAll('.masonry-item img').forEach(img => {
        img.addEventListener('click', () => {
          lastFocus = img;
          lbImg.src = img.src.replace('/c_scale,w_500/', '/c_scale,w_1400/');
          lbImg.alt = img.alt;
          lightbox.classList.add('open');
          document.body.style.overflow = 'hidden';
          document.getElementById('lightboxClose').focus();
        });
      });

      const closeLightbox = () => {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
        if (lastFocus) lastFocus.focus();
      };

      document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          if (lightbox.classList.contains('open')) closeLightbox();
          else navLinks.classList.remove('open');
        }
      });
    }
  </script>
